<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>cvarlist — Dota 2 API Dumper</title>
    <link rel="stylesheet" href="../../assets/style.css" />
    <script src="../../assets/site-header.js" defer></script>
    <style>
        .cvar-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--dim);
            margin-top: 3px;
        }

        .cvar-value {
            color: var(--text);
            opacity: .7;
        }

        .cvar-flag {
            display: inline-block;
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0 4px;
            margin-right: 4px;
            font-size: 10px;
        }

        .cvar-description {
            font-family: var(--sans);
            font-size: 12px;
            color: var(--dim);
            margin-top: 3px;
        }

        .list-item {
            padding: 8px 12px;
        }
    </style>
</head>

<body>

    <header>
        <site-header base="../../" active="cvarlist"></site-header>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                <span>CVARLIST</span>
                <span id="count"></span>
            </div>
            <div class="panel-body" id="list"></div>
        </div>
    </main>

    <script>
        fetch("../../data/cvarlist/data.json")
            .then(res => res.json())
            .then(json => {
                document.getElementById("count").textContent = json.meta.count + " entries";

                const list = document.getElementById("list");
                json.data.forEach((item, i) => {
                    const el = document.createElement("div");
                    el.className = "list-item";

                    const idx = document.createElement("span");
                    idx.className = "list-item-index";
                    idx.textContent = i + 1;

                    const nameSpan = document.createElement("span");
                    nameSpan.textContent = item.name;

                    el.appendChild(idx);
                    el.appendChild(nameSpan);

                    const meta = document.createElement("div");
                    meta.className = "cvar-meta";

                    const valueSpan = document.createElement("span");
                    valueSpan.className = "cvar-value";
                    valueSpan.textContent = item.value;
                    meta.appendChild(valueSpan);

                    if (item.flags && item.flags.length > 0) {
                        const sep = document.createElement("span");
                        sep.textContent = "  ";
                        meta.appendChild(sep);

                        item.flags.forEach(flag => {
                            const f = document.createElement("span");
                            f.className = "cvar-flag";
                            f.textContent = flag;
                            meta.appendChild(f);
                        });
                    }

                    el.appendChild(meta);

                    if (item.description) {
                        const desc = document.createElement("div");
                        desc.className = "cvar-description";
                        desc.textContent = item.description;
                        el.appendChild(desc);
                    }

                    list.appendChild(el);
                });
            })
            .catch(() => {
                document.getElementById("list").innerHTML =
                    '<div class="state-dim">Failed to load data.</div>';
            });
    </script>

</body>

</html>
